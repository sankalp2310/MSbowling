<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Bowling Lane 🎳</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: linear-gradient(#7f1d1d, #1f2937);
  font-family: Arial, sans-serif;
  color: white;
  overscroll-behavior: none;
}

#screen {
  display: flex;
  flex-direction: column;
  height: 100%;
}

#setup {
  padding: 12px;
  text-align: center;
}

input {
  padding: 8px;
  margin: 4px;
  width: 42%;
  border-radius: 6px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: #ec4899;
  color: white;
  font-size: 16px;
}

canvas {
  flex: 1;
  width: 100%;
  touch-action: none;
  background: #a16207;
}
</style>
</head>

<body>

<div id="screen">

  <!-- PLAYER INPUT -->
  <div id="setup">
    <input id="p1" placeholder="Player 1 name">
    <input id="p2" placeholder="Player 2 name"><br>
    <button onclick="startGame()">Start Bowling 🎳</button>
  </div>

  <!-- GAME -->
  <canvas id="game"></canvas>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - document.getElementById("setup").offsetHeight;
}
window.addEventListener("resize", resize);
resize();

/* GAME STATE */
let names = ["Player 1", "Player 2"];
let currentPlayer = 0;

let ball = {
  x: canvas.width / 2,
  y: canvas.height - 80,
  r: 16,
  vx: 0,
  vy: 0,
  spin: 0,
  moving: false
};

let pins = [];
let dragging = false;
let startX = 0, startY = 0;

/* PINS */
function resetPins() {
  pins = [];
  const layout = [
    [0,0],
    [-20,20],[20,20],
    [-40,40],[0,40],[40,40],
    [-60,60],[-20,60],[20,60],[60,60]
  ];
  layout.forEach(p=>{
    pins.push({
      x: canvas.width/2 + p[0],
      y: 80 + p[1],
      vx: 0,
      vy: 0,
      angle: 0,
      hit: false
    });
  });
}

function startGame() {
  names[0] = document.getElementById("p1").value || "Player 1";
  names[1] = document.getElementById("p2").value || "Player 2";
  document.getElementById("setup").style.display = "none";
  resetPins();
}

resetPins();

/* TOUCH CONTROLS */
canvas.addEventListener("touchstart", e=>{
  e.preventDefault();
  if (ball.moving) return;
  dragging = true;
  const t = e.touches[0];
  startX = t.clientX;
  startY = t.clientY;
});

canvas.addEventListener("touchend", e=>{
  e.preventDefault();
  if (!dragging) return;
  dragging = false;
  const t = e.changedTouches[0];
  const dx = startX - t.clientX;
  const dy = startY - t.clientY;
  ball.vx = dx * 0.12;
  ball.vy = dy * 0.2;
  ball.spin = dx * 0.005;
  ball.moving = true;
});

/* PHYSICS */
function collide(b,p) {
  const dx=b.x-p.x, dy=b.y-p.y;
  return Math.sqrt(dx*dx+dy*dy)<b.r+10;
}

/* DRAW PIN */
function drawPin(p){
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(p.angle);
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(-5,12);
  ctx.lineTo(5,12);
  ctx.lineTo(3,-14);
  ctx.lineTo(-3,-14);
  ctx.fill();
  ctx.fillStyle="red";
  ctx.fillRect(-5,-6,10,2);
  ctx.restore();
}

/* MAIN LOOP */
function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (ball.moving) {
    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx += ball.spin;
    ball.vy *= 0.985;
    ball.spin *= 0.96;

    if (ball.y < 0) {
      resetBall();
    }
  }

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle="#ec4899";
  ctx.fill();

  pins.forEach(p=>{
    if (!p.hit && collide(ball,p)) {
      p.hit = true;
      p.vx = ball.vx * 1.5;
      p.vy = ball.vy * 1.5;
      p.angle = Math.random();
    }
    if (p.hit) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.25;
      p.angle += p.vx*0.03;
    }
    drawPin(p);
  });

  requestAnimationFrame(loop);
}

function resetBall() {
  ball.x = canvas.width/2;
  ball.y = canvas.height - 80;
  ball.vx = ball.vy = ball.spin = 0;
  ball.moving = false;
}

loop();
</script>

</body>
</html>
