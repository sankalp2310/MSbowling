<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bowling Lane 🎳</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#7f1d1d, #1f2937);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}
canvas {
  background: #a16207;
  display: block;
  margin: auto;
  border-radius: 16px;
  touch-action: none;
}
</style>
</head>

<body>

<h1>🎳 Bowling Lane</h1>
<p>Pull the ball down & release</p>

<canvas id="lane" width="360" height="600"></canvas>

<script>
const canvas = document.getElementById("lane");
const ctx = canvas.getContext("2d");

let startX = 0, startY = 0;
let dragging = false;

const ball = {
  x: 180,
  y: 520,
  r: 14,
  vx: 0,
  vy: 0,
  spinning: 0,
  moving: false
};

const pins = [];

function resetPins() {
  pins.length = 0;
  const rows = [
    [180,90],
    [165,115],[195,115],
    [150,140],[180,140],[210,140],
    [135,165],[165,165],[195,165],[225,165]
  ];
  rows.forEach(p=>pins.push({
    x:p[0], y:p[1],
    vx:0, vy:0,
    angle:0,
    hit:false
  }));
}

resetPins();

canvas.addEventListener("touchstart", e=>{
  const t=e.touches[0];
  startX=t.clientX-canvas.offsetLeft;
  startY=t.clientY-canvas.offsetTop;
  dragging=true;
});

canvas.addEventListener("touchend", e=>{
  if(!dragging) return;
  dragging=false;

  const t=e.changedTouches[0];
  const endX=t.clientX-canvas.offsetLeft;
  const endY=t.clientY-canvas.offsetTop;

  ball.vy=(startY-endY)*0.15;
  ball.vx=(startX-endX)*0.08;
  ball.spinning=ball.vx*0.02;
  ball.moving=true;
});

function collide(b,p){
  const dx=b.x-p.x;
  const dy=b.y-p.y;
  return Math.sqrt(dx*dx+dy*dy)<b.r+10;
}

function drawPin(p){
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(p.angle);
  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.moveTo(-6,10);
  ctx.lineTo(6,10);
  ctx.lineTo(4,-10);
  ctx.lineTo(-4,-10);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle="red";
  ctx.fillRect(-6,-6,12,2);
  ctx.restore();
}

function update(){
  ctx.clearRect(0,0,360,600);

  // Ball motion
  if(ball.moving){
    ball.x+=ball.vx;
    ball.y+=ball.vy;
    ball.vy*=0.985;
    ball.vx+=ball.spinning;
    ball.spinning*=0.98;

    if(ball.y<0){ reset(); }
  }

  // Ball
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle="#ec4899";
  ctx.fill();

  // Pins
  pins.forEach(p=>{
    if(!p.hit && collide(ball,p)){
      p.hit=true;
      p.vx=ball.vx*2;
      p.vy=ball.vy*2;
      p.angle=Math.random()*1;
    }
    if(p.hit){
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=0.2;
      p.angle+=p.vx*0.05;
    }
    drawPin(p);
  });

  requestAnimationFrame(update);
}

function reset(){
  ball.x=180; ball.y=520;
  ball.vx=ball.vy=ball.spinning=0;
  ball.moving=false;
  resetPins();
}

update();
</script>

</body>
</html>
