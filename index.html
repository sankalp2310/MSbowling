<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Bowling Lane 🎳</title>

<style>
body {
  margin: 0;
  background: linear-gradient(#7f1d1d, #1f2937);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}
canvas {
  display: block;
  margin: auto;
  background: #a16207;
  border-radius: 16px;
}
#ui {
  margin-top: 10px;
}
input {
  padding: 6px;
  margin: 4px;
}
button {
  padding: 8px 16px;
}
.active {
  color: #f9a8d4;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎳 Bowling Lane</h1>

<div id="setup">
  <input id="p1" placeholder="Player 1 name">
  <input id="p2" placeholder="Player 2 name">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="400" height="600"></canvas>

<div id="ui"></div>

<audio id="hitSound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
<audio id="strikeSound" src="https://actions.google.com/sounds/v1/sports/bowling_strike.ogg"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let names = [];
let scores = [0,0];
let player = 0;
let frame = 1;
let roll = 1;

let dragging = false;
let startX = 0, startY = 0;

let shake = 0;

const ball = { x:200, y:520, vx:0, vy:0, r:14, moving:false };

let pins = [];

function resetPins() {
  pins = [];
  let pattern = [
    [200,80],
    [190,100],[210,100],
    [180,120],[200,120],[220,120],
    [170,140],[190,140],[210,140],[230,140]
  ];
  pattern.forEach(p => pins.push({x:p[0],y:p[1],vx:0,vy:0,hit:false}));
}

function startGame() {
  names[0] = document.getElementById("p1").value || "Player 1";
  names[1] = document.getElementById("p2").value || "Player 2";
  document.getElementById("setup").style.display="none";
  resetPins();
  updateUI();
}

canvas.addEventListener("mousedown", e=>{
  if(ball.moving) return;
  dragging=true;
  startX=e.offsetX;
  startY=e.offsetY;
});
canvas.addEventListener("mouseup", e=>{
  if(!dragging) return;
  dragging=false;
  ball.vx=(startX-e.offsetX)*0.08;
  ball.vy=(startY-e.offsetY)*0.2;
  ball.moving=true;
});
canvas.addEventListener("mousemove", e=>{
  if(dragging) ball.x=e.offsetX;
});

function collide(b,p) {
  let dx=b.x-p.x, dy=b.y-p.y;
  return Math.sqrt(dx*dx+dy*dy)<b.r+8;
}

function update() {
  ctx.setTransform(1,0,0,1,shake?Math.random()*4:0,shake?Math.random()*4:0);
  ctx.clearRect(-20,-20,500,700);

  if(ball.moving){
    ball.x+=ball.vx;
    ball.y+=ball.vy;
    ball.vy*=0.99;
    ball.vx*=0.99;
  }

  pins.forEach(p=>{
    if(!p.hit && collide(ball,p)){
      p.hit=true;
      p.vx=ball.vx*2;
      p.vy=ball.vy*2;
      document.getElementById("hitSound").play();
    }
    if(p.hit){
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=0.1;
    }
    ctx.fillStyle="pink";
    ctx.fillRect(p.x,p.y,10,20);
  });

  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fillStyle="#ec4899";
  ctx.fill();

  if(ball.y<50){
    let hitCount=pins.filter(p=>p.hit).length;
    scores[player]+=hitCount;
    if(hitCount===10){
      document.getElementById("strikeSound").play();
      shake=20;
    }
    nextTurn();
  }

  shake=Math.max(0,shake-1);

  requestAnimationFrame(update);
}

function nextTurn(){
  ball.x=200; ball.y=520; ball.vx=0; ball.vy=0; ball.moving=false;
  resetPins();
  roll++;
  if(roll>2){ roll=1; player=(player+1)%2; if(player===0) frame++; }
  updateUI();
}

function updateUI(){
  document.getElementById("ui").innerHTML=
    `Frame ${frame}/10<br>
     <span class="${player===0?"active":""}">${names[0]}: ${scores[0]}</span> |
     <span class="${player===1?"active":""}">${names[1]}: ${scores[1]}</span>`;
}

update();
</script>

</body>
</html>
``
